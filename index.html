				だみだみだみだみだみだみだみだみ
			</p>
		</div>
	</div>
	<div class="f-item-b">
		<div class="text-2">
			<p>
				ガラスを素材とした2点の作品です。ガラスは特有の透明度と重量感を併せ持ち、他の物質にはない特異な存在感を放ちます。<br>
				制作においては、手で成形した粘土から型をとり、そこへ溶融したガラスを流し込む技法を採用しました。その過程で生まれる意図せぬ気泡や、粘土に残された生々しい指の痕跡が忠実に写し取られています。素材の持つ存在感と、手の痕跡が響き合う2点の作品です。<br>
			</p>
		</div>
	</div>
</div>
